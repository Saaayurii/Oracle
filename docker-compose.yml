services:
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle_xe
    ports:
      - "1521:1521"
      - "8080:8080"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-Oracle123}
      ORACLE_DATABASE: XEPDB1
      APP_USER: ${APP_USER:-bookstore}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD:-Bookstore123}
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./init:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 180s
    restart: unless-stopped

volumes:
  oracle-data:
